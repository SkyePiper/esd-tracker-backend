name: ci

on:
  push:

  pull_request:

jobs:
  testing:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: [3.12]

    env:
      JWT_SECRET: ${{ vars.JWT_SECRET }}
      JWT_ALGORITHM: ${{ vars.JWT_ALGORITHM }}
      JWT_EXPIRE_MINUTES: ${{ vars.JWT_EXPIRE_MINUTES }}
      ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ vars.ADMIN_PASSWORD }}
      DEFAULT_USER_EMAIL: ${{ vars.DEFAULT_USER_EMAIL }}
      DEFAULT_USER_PASSWORD: ${{ vars.DEFAULT_USER_PASSWORD }}

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Poetry
      run: |
        python -m pip install --upgrade pip
        python -m pip install poetry

    - name: Install Application
      run: python -m poetry install

    - name: Test with pytest
      run: python -m poetry run pytest

    - name: Check Formatting
      run: |
        python -m isort . -c
        python -m autoflake . -c
        python -m black . --check

    - name: Lint
      run: python -m pylint .